<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="warm.contact">
  <defs>
    <linearGradient id="wc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a5b"/>
      <stop offset="1" stop-color="#e0a04a"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#140d08" stroke="url(#wc)" stroke-opacity=".55" stroke-width="2"/>
  <g fill="none" stroke="url(#wc)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- a warm link: two nodes joined by a heart-arc -->
    <circle cx="21" cy="24" r="5.5"/>
