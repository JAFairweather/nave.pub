##
## Nave relay — strfry config. Restricted to the fleet via write-policy.py.
## Based on strfry's default template; only db path, bind, info, realIpHeader,
## and writePolicy are Nave-specific.
##

db = "/app/strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 1000000

    # Behind Caddy — trust the forwarded client IP for rate-limiting/logging.
    realIpHeader = "x-forwarded-for"

    info {
        name = "nave relay"
        description = "Private relay for the Nave fleet. Writes restricted to fleet identities; NIP-46 transport open."
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 20

    writePolicy {
        # The fleet allow-list gate. Any executable that speaks the strfry
        # write-policy line protocol; ours is python3 (see write-policy.py).
        plugin = "/app/write-policy.py"
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = false
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}
