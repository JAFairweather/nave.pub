# Nave relay — its own small VPS. strfry behind Caddy (auto-TLS for relay.nave.pub).
# Bring up:  ACME_EMAIL=you@example.com docker compose up -d --build
services:
  strfry:
    build: .
    restart: unless-stopped
    # strfry.conf + the LMDB live on the host so config edits and the event DB
    # survive image rebuilds. The plugin + allowlist are baked into the image
    # (rebuild to change the allow-list), or bind-mount allowlist.json to edit live.
    volumes:
      - ./strfry.conf:/etc/strfry.conf:ro
      - ./allowlist.json:/app/allowlist.json:ro
      - strfry-db:/app/strfry-db
    command: ["/app/strfry", "--config=/etc/strfry.conf", "relay"]
    expose:
      - "7777"
    networks: [relaynet]

  caddy:
    image: caddy:2
    restart: unless-stopped
    # --watch hot-reloads the bind-mounted Caddyfile, so a vhost/cert change
    # applies without a manual restart (the auto-deploy's `up -d` won't recreate
    # Caddy for a mounted-file-only change).
    # image default command (known-good). A clean recreate re-reads the mounted
    # Caddyfile — loading the bunker vhost — without --watch churn.
    depends_on: [strfry]
    ports:
      - "80:80"
      - "443:443"
    # Lets a future bunker.nave.pub vhost reach Bunker46's :8080 on the host
    # (Bunker46 runs in its own compose). Harmless until that vhost is added.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    # relaynet → strfry; naveedge → the Bunker46 web container (shared external
    # network, so bunker.nave.pub proxies container-to-container, not via the
    # host port). fix-bunker-proxy.sh creates naveedge + attaches the bunker web.
    networks: [relaynet, naveedge]

networks:
  relaynet:
  naveedge:
    external: true

volumes:
  strfry-db:
  caddy-data:
  caddy-config:
