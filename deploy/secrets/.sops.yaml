# SOPS config for the nave-owned platform secret bundle.
#
# This bundle (nave.enc.env) holds the box's platform secrets — every Nave
# identity's nsec and the brokered provider credentials. It replaces the old
# home in the luke app repo (sites/luke/secrets.enc.env): secrets belong to the
# PLATFORM, co-located with the deploy pipeline, not to one app.
#
# Encrypted with `age` (one keypair, no GPG, no cloud KMS — right for a single
# box). The age PRIVATE key lives only on the box at
# /root/.config/sops/age/keys.txt (root-readable). The age PUBLIC key below is
# what encrypts; it's safe in the repo. Anyone can encrypt to it; only the box
# can decrypt.
#
# To add/rotate a key on the box (the private key is box-only):
#   cd deploy/secrets
#   sops -d --input-type dotenv --output-type dotenv nave.enc.env > nave.env
#   # edit nave.env (add a KEY=value line)
#   sops -e --input-type dotenv --output-type dotenv nave.env > nave.enc.env.new
#   mv nave.enc.env.new nave.enc.env && rm -f nave.env
# (run from THIS directory so SOPS finds this .sops.yaml for the creation rule.)

creation_rules:
  # Matches the plaintext input (nave.env) AND the encrypted output
  # (nave.enc.env). SOPS picks the rule from the INPUT path at encrypt time, so
  # this must match nave.env — matching only *.enc.env fails with "no matching
  # creation rules found". Also matches the legacy secrets*.env name.
  - path_regex: (nave|secrets).*\.env$
    # The box's age PUBLIC key (age-keygen -y on the box). Public — safe to
    # commit. Only the matching private key (box-only) can decrypt.
    age: age1n75zynrpugascc7a4qrv3j0n4ja0jennywgzzsgmv7ftyzrvvugsppwg2s
