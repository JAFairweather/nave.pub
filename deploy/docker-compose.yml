# The Nave platform — one shared Caddy front door + the box-run services,
# for one Hostinger VPS. Lives in the nave.pub repo; ops home on the box is
# /root/nave.pub/deploy. Each app/service is its own repo, synced into
# ./sites by sites.sh; Caddy serves the static ones off disk and proxies the
# dynamic ones.
#
#   cd /root/nave.pub/deploy
#   cp .env.example .env            # director + ACME email (migrated secrets)
#   # luke.env holds Luke's LUKE_NSEC + LUKE_MASTER_NPUB
#   bash sites.sh && docker compose up -d --build

services:
  # The Noir Director (the AI game master) — built from the noir repo, which
  # sites.sh syncs into ./sites/noir. Its build recipe stays in the noir repo.
  director:
    build:
      context: ./sites/noir
      dockerfile: deploy/Dockerfile
    image: noir-director:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - NOIR_GM_PORT=8787
    expose:
      - "8787"                    # internal only; Caddy is the public face
    networks: [nave]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Luke — the delegated-agent card + the nostr-signed cockpit gate. Its own
  # repo (jafairweather/luke), synced into ./sites/luke, built standalone.
  # Its env lives at ./luke.env on the box (gitignored, never in a repo).
  luke:
    build:
      context: ./sites/luke
    image: luke:latest
    restart: unless-stopped
    env_file:
      # Consumer env: sites.sh strips the brokered credentials (ANTHROPIC_API_KEY,
      # TELEGRAM_BOT_TOKEN) from this copy — luke-service reaches those providers
      # through Nactor's broker, so the tokens live only in Nactor. NOT nave.env
      # (that keeps the tokens; only nactor reads it). Generated whenever nave.env
      # is, so both-present-or-both-absent; required:false keeps the stack up.
      - path: ./nave-consumer.env
        required: false
    environment:
      - LUKE_PORT=8790
      # Phase 2: route luke-poster's Telegram calls through Nactor's broker
      # (same nave network). luke signs NIP-98 with its own key; the bot token
      # lives only in Nactor. Falls back to the direct call if the broker errs
      # while TELEGRAM_BOT_TOKEN is still in luke.env, so this is safe to enable.
      - NACT_BROKER_URL=http://nactor:8791/api
      # Phase 2: authorize the brain's NIP-98 signature on POST /propose, so the
      # shared PROPOSE_TOKEN can be retired. Public npub — safe to commit.
      - BRAIN_NPUB=npub16grw57ekvvrudstm6fn7kduc5g0zv350j5057jnnsvat6ct4xr6swjtd6h
      # Persist pending proposals to a box-local file so a restart/deploy never
      # drops a draft you haven't tapped yet (they used to live only in RAM).
      - PENDING_FILE=/state/pending.json
      # Cockpit gate session lifetime, in seconds. Shortened from the 12h default
      # to 3h so a lingering signed-in window (e.g. an incognito tab left open)
      # doesn't stay open-access as long — re-auth is one Alby signature. The
      # nostr gate is the cockpit's sole lock (OpenClaw device pairing is off, as
      # it can't be approved under trusted-proxy auth), so a tighter TTL is the
      # cheap hygiene win. luke-service reads GATE_SESSION_TTL.
      - GATE_SESSION_TTL=10800
      # The Luke Console (console.nave.pub) reads/writes Luke's config from the
      # mounted OpenClaw workspace, and shows a sanitized view of the engine
      # config. Same nostr gate as the cockpit.
      - BRAIN_DIR=/brain/workspace
      - OC_JSON=/brain/openclaw.json
    volumes:
      # Box-local, gitignored, survives redeploys. Holds the pending-proposal store.
      - ./luke-state:/state
      # Luke's OpenClaw workspace (his .md config + the workspace git), mounted rw
      # so the Console can edit + commit. Same box-local dir OpenClaw itself uses.
      - ./openclaw-state/.openclaw/workspace:/brain/workspace
      # The engine config, read-only, for the Console's sanitized runtime view.
      # Single-file mount: ops edits rewrite it in place (inode preserved), so the
      # view stays live; if the gateway ever replaces the inode, a luke restart
      # re-syncs. Never parsed for secrets — luke-console masks before serving.
      - ./openclaw-state/.openclaw/openclaw.json:/brain/openclaw.json:ro
    expose:
      - "8790"
    networks: [nave]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8790/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nactor — the Nact runtime, the NIP-98-gated control-plane API behind
  # nact.nave.pub/api. Built from the nact repo's nactor/. Reuses luke.env for
  # the master npub + role signing keys (LUKE_NSEC / NAVE_NSEC). Config persists
  # in nact_data. See sites/nact/nactor/README.md.
  nactor:
    build:
      context: ./sites/nact
      dockerfile: nactor/Dockerfile
    image: nactor:latest
    restart: unless-stopped
    env_file:
      # nave.env is the full platform bundle (regenerated from SOPS by sites.sh on
      # every deploy). It carries every identity key — including NACTOR_NSEC, now
      # SOPS-sealed rather than plaintext — plus the brokered provider creds only
      # Nactor holds. nactor.env is box-local (gitignored) and untouched by
      # sites.sh; it survives as an override slot but no longer holds NACTOR_NSEC.
      - path: ./nave.env
        required: false
      - path: ./nactor.env
        required: false
      # brain.env is box-local (gitignored, minted by ops/gen-brain-key.sh) and
      # untouched by sites.sh — it holds BRAIN_NSEC (the `brain` identity the
      # broker gates on) + NACT_BROKER_URL. Same durability rule as nactor.env.
      - path: ./brain.env
        required: false
    environment:
      - NACT_PORT=8791
      - NACT_CONFIG=/data/nact-config.json
      # A1/A2 — ownership enforcement ON. Blanket trust dies: a non-Director caller
      # may use only the credentials a Director-signed grant names it for (graduated
      # per-credential, so a not-yet-migrated credential like telegram stays open
      # until its owner exists). Grant-derived, not an ACL. Flip to 0 to revert.
      - NACT_ENFORCE_CREDENTIAL_OWNERSHIP=1
    expose:
      - "8791"
    volumes:
      - nact_data:/data
    networks: [nave]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8791/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # OpenClaw — Luke's cockpit runtime, self-hosted on the nave network (no
  # published port), replacing the Hostinger-managed container that exposes
  # :57419 to the internet. Runs the gateway DIRECTLY (not the server.mjs token
  # wrapper) in trusted-proxy mode: Caddy's nostr-signed gate is the outer lock,
  # and Caddy asserts the operator via X-Forwarded-User (see the Caddyfile luke
  # block). The Hostinger image (same version as Luke's state, 2026.6.9) carries
  # every stock plugin the live instance uses, so state + behavior are at parity.
  #
  # LIVE since the cutover (2026-07): this replaced the Hostinger-managed
  # instance. A first-class managed service now — no profile — so deploys keep
  # it running and --remove-orphans never reaps it. Its state config (trusted-
  # proxy, bind=lan, channels) is patched by ops/oc-config-patch.sh; see
  # deploy/OPENCLAW-CUTOVER.md for the history and rollback.
  openclaw:
    # UPSTREAM image (pinned) — we left the Hostinger build (2026.6.9) for the
    # project's own release channel so upgrades are deliberate: bump this tag,
    # read the changelog, deploy, then run ops/oc-skin-regression.sh. The
    # -browser variant bundles Chromium+Xvfb (Luke's browser tool needs it).
    # Upstream's entrypoint IS the openclaw CLI (node dist/index.js) and it runs
    # as user `node` (uid 1000) — openclaw-state/.openclaw is chowned 1000:1000.
    image: ghcr.io/openclaw/openclaw:2026.7.1-browser
    restart: unless-stopped
    # --auth trusted-proxy: no shared token; the gateway trusts Caddy's asserted
    # user. Bind mode + trustedProxies/allowUsers come from the patched config.
    # Port stays 57419 (our flag, not a wrapper default) so Caddy + every ops
    # script keep working unchanged. Upstream's ENTRYPOINT is tini (an init, not
    # the CLI), so command must carry the full `node openclaw.mjs …` invocation —
    # a bare ["gateway", …] would make tini exec a nonexistent binary.
    command: ["node", "openclaw.mjs", "gateway", "--auth", "trusted-proxy", "--port", "57419"]
    environment:
      - HOME=/data                 # openclaw reads state at /data/.openclaw (os.homedir honors $HOME)
    env_file:
      # Box-local (gitignored): ANTHROPIC_API_KEY (the agent's model key) + TZ.
      # NO OPENCLAW_GATEWAY_TOKEN — trusted-proxy mode doesn't use one.
      - path: ./openclaw.env
        required: false
    volumes:
      # The migrated state (agents, memory, config), refreshed from the live
      # instance by ops/oc-resync-boot.sh. gitignored, box-local.
      - ./openclaw-state/.openclaw:/data/.openclaw
      # Pinned static himalaya binary (ops/mail-setup.sh) — the upstream image
      # doesn't bundle it; single-file mount so the rest of /usr/local/bin is
      # untouched and the tool survives container recreation.
      - ./openclaw-tools/himalaya:/usr/local/bin/himalaya:ro
      # himalaya's config at its default lookup path ($HOME/.config/…). IMAP-only
      # — no SMTP backend exists, so mail can be read + drafted but NEVER sent.
      - ./openclaw-state/.openclaw/mail/config.toml:/data/.config/himalaya/config.toml:ro
    expose:
      - "57419"                    # internal to the nave network only — never published
    networks: [nave]
    healthcheck:
      # bind=lan binds the container's network interface, not loopback, so probe
      # the container's own hostname (its nave-net IP), not 127.0.0.1.
      test: ["CMD", "node", "-e", "require('net').connect(57419,process.env.HOSTNAME).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"                   # ACME http-01 challenge + http→https redirect
      - "443:443"                 # HTTP/1.1 + HTTP/2 over TCP
      - "443:443/udp"             # HTTP/3 (QUIC). Caddy advertises `alt-svc: h3`
                                  # by default; without UDP 443 published, browsers
                                  # that cache that hint try QUIC into a black hole
                                  # and can fail with ERR_CONNECTION_CLOSED. Publish
                                  # UDP so HTTP/3 actually works instead of stalling.
    env_file: .env                # Caddy reads ACME_EMAIL from here
    volumes:
      # Mount the DIRECTORY, not the single Caddyfile. A single-file bind mount
      # freezes the file's inode at container-creation time, so a `git pull`
      # that REPLACES the file (new inode) leaves the container reading the old
      # content forever — new app vhosts silently never load, and `caddy
      # reload` re-reads the same stale inode. A directory mount resolves the
      # path live on each open, so the container always sees the current file.
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data          # certificates persist here — do not delete
      - caddy_config:/config
      # Every repo, synced by sites.sh → served at <name>.nave.pub. The hub
      # (nave.pub) is cloned into ./sites/nave and served at the apex from
      # /srv/apps/nave — the same read-only mount as every app, so its assets/
      # and .well-known/ (avatars, NIP-05) are served with no per-file mounts.
      # It's a FRESH clone, so the box's deploy/.env is never in here.
      - ./sites:/srv/apps:ro
    networks: [nave]
    # Lets Caddy reach services published on the host (Luke/OpenClaw on host
    # port 57419) via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [director, luke]

networks:
  nave:
    name: nave

volumes:
  caddy_data:
  caddy_config:
  nact_data:
