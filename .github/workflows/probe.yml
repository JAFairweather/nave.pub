# Read-only probe of the relay/bunker box from a GitHub runner (open outbound,
# unlike the assistant's sandbox). Dispatch it, read the run log. No secrets.
name: probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: probe endpoints
        run: |
          echo "===== DNS ====="
          getent hosts bunker.nave.pub relay.nave.pub || true
          echo "===== BUNKER: verbose handshake + response head ====="
          curl -sSv --max-time 25 https://bunker.nave.pub/ 2>&1 | head -50 || true
          echo "===== BUNKER: status line ====="
          curl -sS -o /dev/null -w "http=%{http_code} ssl_verify=%{ssl_verify_result} time=%{time_total}s\n" --max-time 25 https://bunker.nave.pub/ 2>&1 || echo "(bunker request failed entirely)"
          echo "===== BUNKER: cert ====="
          echo | openssl s_client -connect bunker.nave.pub:443 -servername bunker.nave.pub 2>/dev/null | openssl x509 -noout -subject -issuer -dates 2>/dev/null || echo "(no cert / TLS handshake failed)"
          echo "===== RELAY: NIP-11 (control — should work) ====="
          curl -sS --max-time 25 -H 'Accept: application/nostr+json' https://relay.nave.pub/ 2>&1 | head -3 || echo "(relay request failed)"
          echo "===== RELAY: status ====="
          curl -sS -o /dev/null -w "http=%{http_code}\n" --max-time 25 https://relay.nave.pub/ 2>&1 || true
          echo "===== BUNKER :8080 DIRECT (should be SEALED after hardening: refused/timeout) ====="
          curl -sS -o /dev/null -w "http=%{http_code} time=%{time_total}s\n" --max-time 10 http://145.79.6.80:8080/ 2>&1 || echo "(no answer on :8080 — sealed ✓)"
          echo "===== MAIN BOX: nact.nave.pub /api/health ====="
          curl -sS -w "\nhttp=%{http_code} time=%{time_total}s\n" --max-time 25 https://nact.nave.pub/api/health 2>&1 | head -8 || echo "(nact health failed)"
          echo "===== MAIN BOX: nact.nave.pub /api/state ====="
          curl -sS -o /dev/null -w "http=%{http_code} time=%{time_total}s\n" --max-time 25 https://nact.nave.pub/api/state 2>&1 || echo "(nact state failed)"
          echo "===== MAIN BOX: luke.nave.pub ====="
          curl -sS -o /dev/null -w "http=%{http_code} time=%{time_total}s\n" --max-time 25 https://luke.nave.pub/ 2>&1 || echo "(luke failed)"
          echo "===== MAIN BOX: nvoy.nave.pub ====="
          curl -sS -o /dev/null -w "http=%{http_code} time=%{time_total}s\n" --max-time 25 https://nvoy.nave.pub/ 2>&1 || echo "(nvoy failed)"
