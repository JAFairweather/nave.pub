# RESTRICTED ops channel for the relay/BUNKER box (holds the sovereign key).
# Unlike main/warmcontact (full CI key via fleet-ops.yml), this box's CI key is
# locked BOX-SIDE to a forced-command allowlist (deploy/ops/ci-ops-allow.sh), so
# it can only run safe verbs — never a root shell, never read secrets. The verb
# we send here arrives as $SSH_ORIGINAL_COMMAND; the box decides what's allowed.
#
# Secrets: RELAY_SSH_HOST / RELAY_SSH_USER / RELAY_SSH_KEY — a DEDICATED CI key
# whose public half is installed with the command="..." forced-command prefix.
name: relay-ops (restricted)
on:
  workflow_dispatch:
    inputs:
      verb:
        description: Allowed op (enforced box-side)
        type: choice
        default: status
        options: [status, ps, inventory, bunker-ps, restart-relay, restart-bunker, logs]
      container:
        description: 'for verb=logs: container name (e.g. bunker46-web-1)'
        required: false
        default: ''
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH restricted op
        env:
          KEY: ${{ secrets.RELAY_SSH_KEY }}
          HOST: ${{ secrets.RELAY_SSH_HOST }}
          SSH_USER: ${{ secrets.RELAY_SSH_USER }}
          VERB: ${{ inputs.verb }}
          CONTAINER: ${{ inputs.container }}
        run: |
          test -n "$KEY" && test -n "$HOST" && test -n "$SSH_USER" || { echo "missing RELAY_SSH_* secrets"; exit 1; }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id && chmod 600 ~/.ssh/id
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "----- relay-ops (restricted): $VERB $CONTAINER -----"
          # The box's forced command ignores this as a shell command and runs the
          # allowlist dispatcher with SSH_ORIGINAL_COMMAND="$VERB $CONTAINER".
          ssh -i ~/.ssh/id -o StrictHostKeyChecking=accept-new "$SSH_USER@$HOST" "$VERB $CONTAINER"
