name: Diagnose — cert issuance for a vhost

# One-shot diagnostic: why isn't Caddy serving a cert for a given host?
# Inspects the caddy container's actual Caddyfile bind-mount, checks whether
# the file Caddy reads contains the vhost, compares the two deploy roots, and
# reports the .flipped marker. Read-only. Input `host` defaults to nact.nave.pub.
on:
  workflow_dispatch:
    inputs:
      host:
        description: Host to diagnose
        default: nact.nave.pub

concurrency:
  group: deploy-nave
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -u
            H="${{ github.event.inputs.host }}"
            echo "── diagnosing $H ──"
            echo
            echo "## .flipped marker present?"
            ls -la /root/nave.pub/deploy/.flipped 2>/dev/null && echo "FLIPPED → deploy root is /root/nave.pub" || echo "no marker → deploy root is /root/noir"
            echo
            echo "## which Caddyfile does the caddy CONTAINER actually mount?"
            docker inspect deploy-caddy-1 --format '{{range .Mounts}}{{if eq .Destination "/etc/caddy/Caddyfile"}}source={{.Source}}{{end}}{{end}}' 2>/dev/null || echo "(inspect failed)"
            echo
            echo "## does the file the CONTAINER reads contain $H ?"
            docker exec deploy-caddy-1 grep -c "$H" /etc/caddy/Caddyfile 2>/dev/null | sed "s/^/  matches in container view: /" || echo "  (grep failed)"
            echo
            echo "## does each on-disk Caddyfile contain $H ?"
            for f in /root/nave.pub/deploy/Caddyfile /root/noir/deploy/Caddyfile; do
              if [ -f "$f" ]; then
                echo "  $f : $(grep -c "$H" "$f") match(es)"
              else
                echo "  $f : (absent)"
              fi
            done
            echo
            echo "## container running since / created from"
            docker inspect deploy-caddy-1 --format 'created={{.Created}}  started={{.State.StartedAt}}' 2>/dev/null || true
