name: Deploy the Nave

# The deploy button for the whole ecosystem. Two triggers:
#  • the "Run workflow" button (GitHub mobile app → Actions → Deploy the Nave)
#    — a deploy button you can tap from anywhere;
#  • automatically on every push to this repo's main.
# It SSHes to the box and syncs everything: pulls this repo, runs sites.sh
# (which pulls noir + luke + every app), validates the Caddyfile before any
# reload, then compose up. The compose/Caddy config lives here now, in
# nave.pub/deploy — the box's ops home is /root/nave.pub/deploy.
on:
  workflow_dispatch:
  push:
    branches: [main]
    # Workflow edits and docs never need a box deploy (workflows run on GitHub,
    # not the box; .md/LICENSE aren't served). Skip the full pull+build for
    # pushes that touch ONLY these — use the Ops workflow for box commands, or
    # dispatch this deploy manually. A push that also changes real site/app
    # files (index.html, assets, deploy/**) still deploys as normal.
    paths-ignore:
      - '.github/**'
      - '**.md'
      - 'LICENSE'
      - 'deploy/ops/**'      # ops scripts are pulled on-demand by the Ops workflow

concurrency:
  group: deploy-nave
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            # Location-aware, gated on a marker a SUCCESSFUL flip writes — not
            # merely the dir existing (a failed/rolled-back flip leaves the dir
            # behind). So deploys stay on /root/noir until the flip truly cuts
            # over, then follow it to /root/nave.pub. Both dirs share the compose
            # project name "deploy", so this is what prevents a stray deploy from
            # reviving the wrong stack.
            if [ -f /root/nave.pub/deploy/.flipped ]; then ROOT=/root/nave.pub; else ROOT=/root/noir; fi
            echo "deploying from $ROOT"
            cd "$ROOT"
            git pull --ff-only
            cd deploy
            bash sites.sh
            docker run --rm -e ACME_EMAIL=deploy@nave.pub \
              -v "$PWD/caddy/Caddyfile":/etc/caddy/Caddyfile:ro \
              caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile
            docker compose up -d --build --remove-orphans
            # Caddy runs the default `caddy run` (no --watch), and a
            # Caddyfile-only change (e.g. adding an app's vhost) doesn't change
            # the container's config hash, so `compose up` leaves it "Running"
            # with the OLD routes. Reload the live process so new subdomains
            # start serving. The config is mounted as a DIRECTORY (./caddy), so
            # the container reads the current file — no stale-inode trap. Safe
            # to run even when the container was just recreated (no-op then).
            docker compose exec -T caddy caddy reload \
              --config /etc/caddy/Caddyfile --adapter caddyfile
            echo "deploy complete"
