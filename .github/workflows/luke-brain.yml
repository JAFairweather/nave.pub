name: Luke ‚Äî brain (draft proposals)

# Runs the brain over the deploy path (flip-aware). Default is a DRY RUN
# (gathers signals, drafts, prints ‚Äî proposes nothing). Set live=true to
# actually send drafts to your approval bot on Telegram. fix_anthropic=true
# syncs the Director's API key into Luke's secrets first.
on:
  workflow_dispatch:
    inputs:
      live:
        description: "true = propose to Telegram; blank = dry-run only"
        required: false
        default: ""
      fix_anthropic:
        description: "true = copy the Director's ANTHROPIC_API_KEY into Luke's secrets first"
        required: false
        default: ""

concurrency:
  group: deploy-nave
  cancel-in-progress: false

jobs:
  brain:
    runs-on: ubuntu-latest
    steps:
      - name: Run the brain over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          LIVE: ${{ inputs.live }}
          FIX_ANTHROPIC: ${{ inputs.fix_anthropic }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "6m"
          envs: LIVE,FIX_ANTHROPIC
          script: |
            set +e
            export SOPS_AGE_KEY_FILE=/root/.config/sops/age/keys.txt
            # Flip-aware paths.
            if [ -f /root/nave.pub/deploy/.flipped ]; then
              DEPLOY=/root/nave.pub/deploy; LUKEENV=$DEPLOY/luke.env
            else
              DEPLOY=/root/noir/deploy; LUKEENV=/root/noir/luke/.env
            fi
            ENC=$DEPLOY/sites/luke/secrets.enc.env
            cd "$DEPLOY/sites/luke"
            echo "using DEPLOY=$DEPLOY"

            if [ "$FIX_ANTHROPIC" = "true" ]; then
              echo "‚îÄ‚îÄ syncing Director's ANTHROPIC_API_KEY ‚îÄ‚îÄ"
              DIRKEY=$(grep '^ANTHROPIC_API_KEY=' "$DEPLOY/.env" | cut -d= -f2-)
              if [ -n "$DIRKEY" ]; then
                sops -d --output-type dotenv "$ENC" > secrets.env
                grep -q '^ANTHROPIC_API_KEY=' secrets.env \
                  && sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=$DIRKEY|" secrets.env \
                  || echo "ANTHROPIC_API_KEY=$DIRKEY" >> secrets.env
                sops --input-type dotenv --output-type dotenv -e secrets.env > "$ENC" && shred -u secrets.env
              fi
            fi

            # Make sure the container env is current from the encrypted secrets.
            sops -d --output-type dotenv "$ENC" > "$LUKEENV" && chmod 600 "$LUKEENV"

            FLAG="--dry-run"
            [ "$LIVE" = "true" ] && FLAG=""
            # brain.env (box-local) turns on the credential broker: BRAIN_NSEC +
            # NACT_BROKER_URL. If absent, the brain falls back to the direct
            # ANTHROPIC_API_KEY path (non-breaking).
            BRAINENV=""
            [ -f "$DEPLOY/brain.env" ] && BRAINENV="--env-file $DEPLOY/brain.env"
            echo "‚îÄ‚îÄ running brain ${FLAG:-(LIVE ‚Äî proposing to Telegram)} ${BRAINENV:+(broker on)} ‚îÄ‚îÄ"
            docker run --rm --env-file "$LUKEENV" $BRAINENV \
              -v "$DEPLOY/sites/luke/luke-brain.mjs:/app/luke-brain.mjs:ro" \
              -v "$DEPLOY/sites/luke/brief:/app/brief:ro" \
              luke:latest node luke-brain.mjs $FLAG
            echo "‚îÄ‚îÄ brain done ‚îÄ‚îÄ"
