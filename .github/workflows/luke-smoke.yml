name: Luke — recreate + smoke test

# A one-off ops helper: rebuild Luke's container env from the encrypted
# secrets, force-recreate the luke container, report the poster status, and
# fire a /propose smoke test (which DMs the master a Telegram card). Prints
# NO secret values — only the poster line, a key count, and the JSON reply.
on:
  workflow_dispatch:

concurrency:
  group: deploy-nave          # share the deploy lock so it can't race a deploy
  cancel-in-progress: false

jobs:
  luke-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Recreate luke + smoke test over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "3m"
          script: |
            set -e
            export SOPS_AGE_KEY_FILE=/root/.config/sops/age/keys.txt
            cd /root/noir/deploy/sites/luke

            echo "── keys present in secrets.enc.env ──"
            sops -d --output-type dotenv secrets.enc.env \
              | grep -cE '^(LUKE_NSEC|NAVE_NSEC|LUKE_MASTER_NPUB|TELEGRAM_BOT_TOKEN|TELEGRAM_APPROVER_ID|PROPOSE_TOKEN|TELEGRAM_WEBHOOK_SECRET|ANTHROPIC_API_KEY)=.' \
              || echo "0 (decrypt failed?)"

            echo "── writing container env + recreating luke ──"
            sops -d --output-type dotenv secrets.enc.env > /root/noir/luke/.env.new
            mv /root/noir/luke/.env.new /root/noir/luke/.env
            chmod 600 /root/noir/luke/.env
            cd /root/noir/deploy
            docker compose up -d --force-recreate luke
            sleep 3

            echo "── poster status ──"
            docker logs deploy-luke-1 --tail 10 2>&1 | grep -i poster || docker logs deploy-luke-1 --tail 10 2>&1

            echo "── smoke test /propose ──"
            PROPOSE_TOKEN=$(grep '^PROPOSE_TOKEN=' /root/noir/luke/.env | cut -d= -f2-)
            curl -s https://luke.nave.pub/propose \
              -H "authorization: Bearer $PROPOSE_TOKEN" \
              -H "content-type: application/json" \
              -d '{"identity":"luke","text":"Testing the loop — first words from Luke.","rationale":"smoke test via the deploy path"}'
            echo
            echo "── done ──"
